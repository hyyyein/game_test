<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>루이에게서 살아남기</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171523;
      --panel: rgba(255, 239, 250, 0.18);
      --panel-strong: rgba(255, 246, 253, 0.28);
      --line: rgba(255, 255, 255, 0.42);
      --text: #fff8ff;
      --muted: #f5cce9;
      --accent: #ff9fd6;
      --accent-blue: #a8ddff;
      --danger: #ff7f9d;
      --good: #9ff3d2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
      background: #111712;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(760px, calc(100vw - 320px));
    }

    .pill,
    .banner,
    .help {
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 196, 230, 0.12) 42%, rgba(168, 221, 255, 0.16)),
        var(--panel);
      box-shadow:
        0 14px 34px rgba(67, 28, 72, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.55),
        inset 0 -1px 0 rgba(255, 156, 215, 0.2);
      backdrop-filter: blur(16px) saturate(1.25);
    }

    .pill {
      display: flex;
      min-width: 92px;
      height: 48px;
      padding: 8px 12px;
      border-radius: 8px;
      outline: 1px solid rgba(255, 182, 226, 0.18);
      flex-direction: column;
      justify-content: center;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 5px;
      font-size: 17px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .bar {
      position: relative;
      width: 132px;
      height: 8px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--good), var(--accent-blue), var(--accent));
      box-shadow: 0 0 12px rgba(255, 159, 214, 0.55);
    }

    .help {
      max-width: 286px;
      padding: 12px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .banner {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(420px, calc(100vw - 32px));
      padding: 22px;
      transform: translate(-50%, -50%);
      border-radius: 8px;
      text-align: center;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.32), transparent 34%),
        linear-gradient(135deg, rgba(255, 238, 250, 0.34), rgba(167, 221, 255, 0.16) 55%, rgba(255, 157, 214, 0.16));
    }

    .game-over {
      width: min(840px, calc(100vw - 56px));
      max-height: min(680px, calc(100vh - 56px));
      padding: clamp(28px, 5vw, 48px) clamp(30px, 8vw, 72px) 42px;
      overflow: auto;
      background:
        radial-gradient(circle at 24% 16%, rgba(255, 245, 231, 0.32), transparent 38%),
        linear-gradient(135deg, rgba(255, 246, 229, 0.2), rgba(255, 189, 222, 0.1) 46%, rgba(168, 221, 255, 0.1)),
        rgba(79, 55, 46, 0.28);
      box-shadow:
        0 16px 34px rgba(46, 28, 24, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(255, 214, 178, 0.14);
      backdrop-filter: blur(8px) saturate(1.06);
    }

    .banner.game-over h1 {
      margin-bottom: 18px;
      font-size: clamp(48px, 7vw, 72px);
    }

    .banner.game-over p {
      margin-bottom: 30px;
      color: #ffd1ec;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
    }

    .banner h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 2px 16px rgba(255, 134, 207, 0.45);
    }

    .banner p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    button {
      min-width: 150px;
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffe2f3, var(--accent), var(--accent-blue));
      color: #40243a;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 10px 22px rgba(255, 124, 198, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    button:hover {
      filter: brightness(1.07) saturate(1.08);
    }

    .hidden {
      display: none;
    }

    .touch-controls {
      position: fixed;
      inset: auto 16px 18px 16px;
      display: none;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    .joystick {
      position: relative;
      width: 132px;
      height: 132px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.28), rgba(255, 173, 219, 0.16) 45%, rgba(168, 221, 255, 0.18)),
        var(--panel-strong);
      pointer-events: auto;
      touch-action: none;
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 159, 214, 0.32), rgba(168, 221, 255, 0.36));
      box-shadow:
        0 0 22px rgba(255, 159, 214, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .actions {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-btn {
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 173, 219, 0.2), rgba(168, 221, 255, 0.24)),
        var(--panel-strong);
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      touch-action: none;
      user-select: none;
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .touch-btn:active,
    .touch-btn.is-down {
      transform: translateY(1px);
      filter: brightness(1.13) saturate(1.12);
      box-shadow:
        0 0 22px rgba(255, 159, 214, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .touch-btn.fire {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      font-size: 25px;
    }

    .touch-btn.dash {
      width: 58px;
      height: 58px;
      align-self: flex-end;
      font-size: 19px;
    }

    .name-input {
      width: min(260px, 100%);
      height: 42px;
      margin: 0 0 14px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      text-align: center;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .name-input::placeholder {
      color: rgba(255, 248, 255, 0.7);
    }

    .leaderboard {
      display: grid;
      gap: 3px;
      width: min(560px, 100%);
      margin: 0 auto 32px;
      padding: 0;
      color: var(--text);
      list-style: none;
      text-align: center;
      font-size: clamp(20px, 2.5vw, 25px);
      font-weight: 800;
      line-height: 1.2;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 56px minmax(128px, 1fr) 18px 104px 18px 56px;
      align-items: baseline;
      column-gap: 0;
      min-height: 0;
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .rank-number {
      color: #ff8fe6;
      font-weight: 900;
      text-align: right;
      text-shadow: 0 2px 8px rgba(64, 26, 50, 0.36);
      white-space: nowrap;
    }

    .rank-name {
      min-width: 0;
      overflow: hidden;
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      text-align: left;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-separator {
      color: #fff8ff;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-score {
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: right;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-wave {
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: left;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-empty {
      color: #fff8ff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
    }

    .character-select {
      width: min(560px, calc(100vw - 32px));
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      justify-content: center;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 16px;
    }

    .character-card {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      min-height: 190px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.34), transparent 40%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 173, 219, 0.12), rgba(168, 221, 255, 0.18)),
        var(--panel);
      color: var(--text);
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .character-card:focus-visible {
      outline: 2px solid rgba(255, 248, 255, 0.84);
      outline-offset: 3px;
    }

    .character-preview {
      width: 112px;
      height: 118px;
      margin: 0;
      background-repeat: no-repeat;
      background-size: 400% 400%;
      background-position: 0 0;
      filter: drop-shadow(0 8px 12px rgba(35, 18, 42, 0.28));
    }

    .character-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
    }

    @media (max-width: 720px) {
      .hud {
        inset: 10px;
        align-items: stretch;
      }

      .cluster {
        display: grid;
        grid-template-columns: minmax(112px, 1.45fr) repeat(3, minmax(56px, 0.7fr));
        gap: 6px;
        max-width: 100%;
        width: 100%;
      }

      .pill {
        min-width: 0;
        height: 42px;
        padding: 7px 8px;
      }

      .label {
        font-size: 10px;
      }

      .value {
        margin-top: 4px;
        font-size: 14px;
      }

      .bar {
        width: 100%;
        height: 7px;
        margin-top: 6px;
      }

      .help {
        display: none;
      }

      .touch-controls {
        display: flex;
      }

      .character-select {
        width: min(420px, calc(100vw - 24px));
      }

      .character-grid {
        gap: 8px;
      }

      .character-card {
        min-height: 154px;
        padding: 9px;
      }

      .character-preview {
        width: 82px;
        height: 88px;
      }

      .game-over {
        width: min(520px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        padding: 22px 24px 28px;
      }

      .banner.game-over h1 {
        margin-bottom: 12px;
        font-size: 40px;
      }

      .banner.game-over p {
        margin-bottom: 22px;
        font-size: 18px;
      }

      .leaderboard {
        gap: 3px;
        width: min(330px, 100%);
        margin-bottom: 22px;
        font-size: 17px;
      }

      .rank-row {
        grid-template-columns: 38px minmax(88px, 1fr) 12px 66px 12px 38px;
        width: min(330px, 100%);
      }

    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Top-down zombie survival game"></canvas>

  <div class="hud">
    <div class="cluster">
      <div class="pill">
        <span class="label">Health</span>
        <div class="bar"><span id="healthBar"></span></div>
      </div>
      <div class="pill">
        <span class="label">Wave</span>
        <span class="value" id="wave">1</span>
      </div>
      <div class="pill">
        <span class="label">Score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="pill">
        <span class="label">Ammo</span>
        <span class="value" id="ammo">24</span>
      </div>
    </div>
    <div class="help">WASD/조이스틱 이동, 클릭 또는 Space로 사격. R로 재장전, Shift로 짧은 회피.</div>
  </div>

  <section class="banner" id="startScreen">
    <h1>루이에게서 살아남기</h1>
    <p>사나운 루이를 빨리 처치해.<br>웨이브가 올라갈수록 더 빠르고 더 많이 올거야.</p>
    <input class="name-input" id="nicknameInput" maxlength="14" placeholder="닉네임" autocomplete="nickname">
    <button id="startButton">Start Run</button>
  </section>

  <section class="banner character-select hidden" id="characterSelectScreen">
    <h1>캐릭터 선택</h1>
    <div class="character-grid">
      <button class="character-card" data-character="magic" aria-label="핑크 마법소녀 선택">
        <div class="character-preview" style="background-image: url('assets/player-4dir-spritesheet.png')"></div>
        <span>마법소녀</span>
      </button>
      <button class="character-card" data-character="pistol" aria-label="권총 캐릭터 선택">
        <div class="character-preview" style="background-image: url('assets/player-gun-spritesheet.png')"></div>
        <span>권총소녀</span>
      </button>
    </div>
  </section>

  <section class="banner game-over hidden" id="gameOverScreen">
    <h1>Run Over</h1>
    <p id="finalStats">Score 0</p>
    <ol class="leaderboard" id="leaderboardList"></ol>
    <button id="restartButton">Restart</button>
  </section>

  <div class="touch-controls" aria-label="Mobile controls">
    <div class="joystick" id="joystick" aria-label="Move joystick">
      <div class="stick" id="stick"></div>
    </div>
    <div class="actions">
      <button class="touch-btn dash" data-tap="dash" aria-label="Dash">✦</button>
      <button class="touch-btn fire" data-key="Space" aria-label="Fire">★</button>
    </div>
  </div>

      running: false,
      last: 0,
      score: 0,
      wave: 1,
      waveKills: 0,
      nextWaveKills: 10,
      spawnTimer: 0,
      particles: [],
      bullets: [],
      zombies: [],
      pickups: [],
      props: [],
    };

    const player = {
      x: world.w / 2,
      y: world.h / 2,
      r: 18,
      hp: 100,
      maxHp: 100,
      speed: 260,
      dash: 0,
      dashCooldown: 0,
      invulnerable: 0,
      ammo: 24,
      maxAmmo: 24,
      name: "Player",
      reload: 0,
      fireCooldown: 0,
      castPulse: 0,
      animTime: 0,
      moving: false,
      direction: "up",
      angle: -Math.PI / 2,
      character: selectedCharacter,
      bulletStyle: characters[selectedCharacter].bullet,
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function updateCamera() {
      camera.x = clamp(player.x - window.innerWidth / 2, 0, world.w - window.innerWidth);
      camera.y = clamp(player.y - window.innerHeight / 2, 0, world.h - window.innerHeight);
    }

    function isMoveKey(code) {
      return code === "KeyW" || code === "KeyA" || code === "KeyS" || code === "KeyD" ||
        code === "ArrowUp" || code === "ArrowDown" || code === "ArrowLeft" || code === "ArrowRight";
    }

    function cleanName(value) {
      return (value || "").trim().slice(0, 14) || "Player";
    }

    function applyCharacter(key) {
      selectedCharacter = characters[key] ? key : "pistol";
      player.character = selectedCharacter;
      player.bulletStyle = characters[selectedCharacter].bullet;
      playerImage.src = characters[selectedCharacter].src;
      localStorage.setItem("dead-block-run-character", selectedCharacter);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function loadLeaderboard() {
      try {
        const entries = JSON.parse(localStorage.getItem(leaderboardKey) || "[]");
        return Array.isArray(entries) ? entries : [];
      } catch {
        return [];
      }
    }

    async function fetchOnlineLeaderboard() {
      const params = new URLSearchParams({
        select: "nickname,score,wave,created_at",
        order: "score.desc,wave.desc,created_at.asc",
        limit: "10",
      });
      const response = await fetch(`${scoresEndpoint}?${params}`, {
        headers: {
          apikey: supabaseKey,
          Authorization: `Bearer ${supabaseKey}`,
        },
      });
      if (!response.ok) throw new Error(`Leaderboard fetch failed: ${response.status}`);
      const entries = await response.json();
      return entries.map((entry) => ({
        name: entry.nickname,
        score: Number(entry.score) || 0,
        wave: Number(entry.wave) || 1,
        date: new Date(entry.created_at).getTime() || Date.now(),
      }));
    }

    async function uploadOnlineScore(entry) {
      const response = await fetch(scoresEndpoint, {
        method: "POST",
        headers: {
          apikey: supabaseKey,
          Authorization: `Bearer ${supabaseKey}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal",
        },
        body: JSON.stringify({
          nickname: entry.name,
          score: entry.score,
          wave: entry.wave,
        }),
      });
      if (!response.ok) throw new Error(`Score upload failed: ${response.status}`);
    }

    async function saveScore() {
      const entries = loadLeaderboard();
      const entry = {
        name: player.name,
        score: state.score,
        wave: state.wave,
        date: Date.now(),
      };
      entries.push(entry);
      entries.sort((a, b) => b.score - a.score || b.wave - a.wave || a.date - b.date);
      localStorage.setItem(leaderboardKey, JSON.stringify(entries.slice(0, 10)));
      try {
        await uploadOnlineScore(entry);
      } catch {
        // Local save already happened, so the score is not lost if the network fails.
      }
      renderLeaderboard();
    }

    async function renderLeaderboard() {
      let entries = loadLeaderboard();
      try {
        entries = await fetchOnlineLeaderboard();
      } catch {
        // Offline or Supabase setup issue: keep the game playable with local scores.
      }
      leaderboardList.innerHTML = entries.length
        ? entries.slice(0, 10).map((entry, index) => {
            const rank = index + 1;
            return `<li class="rank-row">
              <span class="rank-number">${rank}.</span>
              <span class="rank-name">${escapeHtml(entry.name)}</span>
              <span class="rank-separator">·</span>
              <span class="rank-score">${entry.score}</span>
              <span class="rank-separator">·</span>
              <span class="rank-wave">W${entry.wave}</span>
            </li>`;
          }).join("")
        : `<li class="rank-empty">첫 기록을 기다리는 중</li>`;
    }

    function circleHitsRect(x, y, r, rect) {
      const nearestX = clamp(x, rect.x, rect.x + rect.w);
      const nearestY = clamp(y, rect.y, rect.y + rect.h);
      return Math.hypot(x - nearestX, y - nearestY) < r;
    }

    function hitsWall(x, y, r) {
      return walls.some((wall) => circleHitsRect(x, y, r, wall));
    }

    function moveActor(actor, dx, dy, radius) {
      const beforeX = actor.x;
      const beforeY = actor.y;
      const nextX = clamp(actor.x + dx, 28, world.w - 28);
      if (!hitsWall(nextX, actor.y, radius)) actor.x = nextX;
      const nextY = clamp(actor.y + dy, 28, world.h - 28);
      if (!hitsWall(actor.x, nextY, radius)) actor.y = nextY;
      return Math.hypot(actor.x - beforeX, actor.y - beforeY);
    }

    function findOpenPointAround(x, y, minRadius, maxRadius, bodyRadius) {
      for (let i = 0; i < 36; i++) {
        const angle = rand(0, Math.PI * 2);
        const radius = rand(minRadius, maxRadius);
        const px = clamp(x + Math.cos(angle) * radius, 44, world.w - 44);
        const py = clamp(y + Math.sin(angle) * radius, 44, world.h - 44);
        if (!hitsWall(px, py, bodyRadius)) return { x: px, y: py };
      }
      return null;
    }

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

        wave: 1,
        waveKills: 0,
        nextWaveKills: 10,
        spawnTimer: 0,
        particles: [],
        bullets: [],
        zombies: [],
        pickups: [],
      });
      state.props = makeProps();
      spawnPack(5);
      startScreen.classList.add("hidden");
      characterSelectScreen.classList.add("hidden");
      gameOverScreen.classList.add("hidden");
      updateHud();
      requestAnimationFrame(loop);
    }

    function makeProps() {
      return [];
    }

    function spawnZombie() {
      const edge = Math.floor(rand(0, 4));
      const z = {
        x: edge === 0 ? -80 : edge === 1 ? world.w + 80 : rand(0, world.w),
        y: edge === 2 ? -80 : edge === 3 ? world.h + 80 : rand(0, world.h),
        r: rand(15, 23),
        hp: 42 + state.wave * 8,
        maxHp: 42 + state.wave * 8,
        speed: rand(58, 84) + state.wave * 5,
        hit: 0,
        sway: rand(0, Math.PI * 2),
        stuck: 0,
        animTime: rand(0, 1),
        direction: "down",
      };
      state.zombies.push(z);
    }

    function spawnPack(count) {
      for (let i = 0; i < count; i++) spawnZombie();
    }

    function shoot() {
      if (player.fireCooldown > 0 || player.reload > 0 || player.ammo <= 0) return;
      player.ammo -= 1;
      player.fireCooldown = 0.105;
      player.castPulse = 0.2;
      const spread = rand(-0.04, 0.04);
      const angle = player.angle + spread;
      state.bullets.push({
        x: player.x + Math.cos(angle) * 42,
        y: player.y + Math.sin(angle) * 42,
        vx: Math.cos(angle) * 860,
        vy: Math.sin(angle) * 860,
        life: 0.78,
        damage: 34,
        style: player.bulletStyle,
      });
      const sparkColor = player.bulletStyle === "pistol" ? "#ffc95a" : "#ff65bc";
      puff(player.x + Math.cos(angle) * 46, player.y + Math.sin(angle) * 46, sparkColor, 6, 220);
    }

    function reload() {
      if (player.reload <= 0 && player.ammo < player.maxAmmo) {
        player.reload = 0.95;
      }
    }

    function aimFromVector(x, y) {
      if (Math.hypot(x, y) < 0.08) return;
      player.angle = Math.atan2(y, x);
      if (Math.abs(x) > Math.abs(y)) {
        player.direction = x > 0 ? "right" : "left";
      } else {
        player.direction = y > 0 ? "down" : "up";
      }
    }

    function dash() {
      if (player.dashCooldown > 0) return;
      player.dash = 0.16;
      player.dashCooldown = 1.15;
      player.invulnerable = 0.24;
    }

    function puff(x, y, color, count, speed) {
      for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const s = rand(speed * 0.25, speed);
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: rand(2, 5),
          life: rand(0.24, 0.58),
          maxLife: 0.58,
          color,
        });
      }
    }

    function update(dt) {
      if (joystickState.active) aimFromVector(joystickState.x, joystickState.y);
      if (pointer.down || keys.has("Space")) shoot();
      if (player.ammo === 0) reload();

      const wasReloading = player.reload > 0;
      player.fireCooldown = Math.max(0, player.fireCooldown - dt);
      player.reload = Math.max(0, player.reload - dt);
      player.dash = Math.max(0, player.dash - dt);
      player.dashCooldown = Math.max(0, player.dashCooldown - dt);
      player.invulnerable = Math.max(0, player.invulnerable - dt);
      player.castPulse = Math.max(0, player.castPulse - dt);
      if (wasReloading && player.reload === 0) player.ammo = player.maxAmmo;

      const move = { x: 0, y: 0 };
      if (keys.has("KeyW") || keys.has("ArrowUp")) move.y -= 1;
      if (keys.has("KeyS") || keys.has("ArrowDown")) move.y += 1;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) move.x -= 1;
      if (keys.has("KeyD") || keys.has("ArrowRight")) move.x += 1;
      move.x += joystickState.x;
      move.y += joystickState.y;
      const len = Math.hypot(move.x, move.y) || 1;
      const dashBoost = player.dash > 0 ? 2.7 : 1;
      player.moving = move.x !== 0 || move.y !== 0;
      if (player.moving) {
        player.animTime += dt * dashBoost;
        aimFromVector(move.x, move.y);
      }
      moveActor(player, (move.x / len) * player.speed * dashBoost * dt, (move.y / len) * player.speed * dashBoost * dt, player.r);

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnZombie();
        state.spawnTimer = Math.max(0.9, 2.0 - state.wave * 0.08);
      }

      for (const bullet of state.bullets) {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;
      }
      state.bullets = state.bullets.filter((b) => b.life > 0 && b.x > -80 && b.y > -80 && b.x < world.w + 80 && b.y < world.h + 80 && !hitsWall(b.x, b.y, 5));

      for (const zombie of state.zombies) {
        zombie.hit = Math.max(0, zombie.hit - dt);
        zombie.sway += dt * 3;
        const angle = Math.atan2(player.y - zombie.y, player.x - zombie.x) + Math.sin(zombie.sway) * 0.08;
        const vx = Math.cos(angle);
        const vy = Math.sin(angle);
        const moved = moveActor(zombie, vx * zombie.speed * dt, vy * zombie.speed * dt, zombie.r * 0.85);
        if (moved < zombie.speed * dt * 0.22) {
          zombie.stuck += dt;
          const side = Math.sin(zombie.sway * 1.7) > 0 ? 1 : -1;
          const slideX = -vy * side;
          const slideY = vx * side;
          moveActor(zombie, slideX * zombie.speed * dt * 0.95, slideY * zombie.speed * dt * 0.95, zombie.r * 0.85);
          if (zombie.stuck > 1.4 && distance(zombie, player) > 180) {
            const openPoint = findOpenPointAround(player.x, player.y, 360, 720, zombie.r * 0.85);
            if (openPoint) {
              zombie.x = openPoint.x;
              zombie.y = openPoint.y;
              zombie.stuck = 0;
            }
          }
        } else {
          zombie.stuck = 0;
        }
        zombie.animTime += dt;
        if (Math.abs(vx) > Math.abs(vy)) {
          zombie.direction = vx > 0 ? "right" : "left";
        } else {
          zombie.direction = vy > 0 ? "down" : "up";
        }

        if (distance(zombie, player) < zombie.r + player.r && player.invulnerable <= 0) {
          player.hp -= 13;
          player.invulnerable = 0.55;
          zombie.x -= Math.cos(angle) * 36;
          zombie.y -= Math.sin(angle) * 36;
          puff(player.x, player.y, "#f06b59", 10, 150);
          if (player.hp <= 0) endGame();
        }
      }

      for (const bullet of state.bullets) {
        for (const zombie of state.zombies) {
          if (zombie.hp <= 0 || distance(bullet, zombie) > zombie.r + 4) continue;
          zombie.hp -= bullet.damage;
          zombie.hit = 0.1;
          bullet.life = 0;
          puff(bullet.x, bullet.y, "#9acd6e", 6, 130);
          if (zombie.hp <= 0) killZombie(zombie);
          break;
        }
      }

      state.zombies = state.zombies.filter((z) => z.hp > 0);

      for (const pickup of state.pickups) {
        pickup.spin += dt * 4;
        if (distance(pickup, player) < 34) {
          if (pickup.type === "health") player.hp = Math.min(player.maxHp, player.hp + 24);
          if (pickup.type === "ammo") player.ammo = player.maxAmmo;
          pickup.life = 0;
          puff(pickup.x, pickup.y, pickup.type === "health" ? "#6fd08c" : "#e9c46a", 12, 125);
        }
        pickup.life -= dt;
      }
      state.pickups = state.pickups.filter((p) => p.life > 0);

      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life -= dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);

      updateCamera();
      updateHud();
    }

    function killZombie(zombie) {
      state.score += 100 + state.wave * 12;
      state.waveKills += 1;
      puff(zombie.x, zombie.y, "#587747", 18, 180);
      if (Math.random() < 0.16) {
        state.pickups.push({
          x: zombie.x,
          y: zombie.y,
          type: Math.random() < 0.45 ? "health" : "ammo",
          spin: 0,
          life: 9,
        });
      }
      if (state.waveKills >= state.nextWaveKills) {
        state.wave += 1;
        state.waveKills = 0;
        state.nextWaveKills += 5;
        player.maxAmmo = Math.min(42, player.maxAmmo + 2);
        player.ammo = player.maxAmmo;
        player.hp = Math.min(player.maxHp, player.hp + 18);
        spawnPack(2 + Math.ceil(state.wave / 2));
      }
    }

    function endGame() {
      state.running = false;
      bgm.pause();
      finalStats.textContent = `Score ${state.score} · Wave ${state.wave}`;
      saveScore();
      gameOverScreen.classList.remove("hidden");
    }

    function updateHud() {
      healthBar.style.width = `${clamp(player.hp / player.maxHp, 0, 1) * 100}%`;
      waveEl.textContent = state.wave;
      scoreEl.textContent = state.score;
      ammoEl.textContent = player.reload > 0 ? "Reload" : `${player.ammo}/${player.maxAmmo}`;
    }

    function draw() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(-camera.x, -camera.y);
      drawGround();
      drawProps();
      drawPickups();
      drawBullets();
      drawZombies();
      drawPlayer();
      drawParticles();
      ctx.restore();
      drawVignette(w, h);
    }

    function drawGround() {
      ctx.fillStyle = "#121a14";
      ctx.fillRect(0, 0, world.w, world.h);
      if (mapImage.complete && mapImage.naturalWidth > 0) {
        ctx.drawImage(mapImage, 0, 0, world.w, world.h);
        ctx.fillStyle = "rgba(20, 12, 8, 0.14)";
        ctx.fillRect(0, 0, world.w, world.h);
      } else {
        ctx.strokeStyle = "rgba(232,239,221,0.045)";
        ctx.lineWidth = 1;
        for (let x = 0; x < world.w; x += 80) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, world.h);
          ctx.stroke();
        }
        for (let y = 0; y < world.h; y += 80) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(world.w, y);
          ctx.stroke();
        }
      }
      ctx.strokeStyle = "rgba(233,196,106,0.28)";
      ctx.lineWidth = 5;
      ctx.strokeRect(6, 6, world.w - 12, world.h - 12);
    }

    function drawProps() {
      for (const prop of state.props) {
        ctx.save();
        ctx.translate(prop.x, prop.y);
        ctx.rotate(prop.rot);
        ctx.fillStyle = prop.shade;
        ctx.fillRect(-prop.w / 2, -prop.h / 2, prop.w, prop.h);
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.lineWidth = 3;
        ctx.strokeRect(-prop.w / 2, -prop.h / 2, prop.w, prop.h);
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        ctx.fillRect(-prop.w / 2 + 8, -prop.h / 2 + 8, prop.w - 16, 5);
        ctx.restore();
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.globalAlpha = player.invulnerable > 0 ? 0.62 : 1;
      const spriteConfig = characters[player.character] || characters.pistol;
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.beginPath();
      ctx.ellipse(0, 22, 24, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      if (playerImage.complete && playerImage.naturalWidth > 0) {
        const frameW = playerImage.naturalWidth / 4;
        const frameH = playerImage.naturalHeight / 4;
        const walkFrame = Math.floor(player.animTime * 9) % 4;
        const row = spriteConfig.rows[player.direction] ?? 0;
        const col = player.castPulse > 0 && !player.moving ? 3 : player.moving ? walkFrame : 0;
        const crop = spriteConfig.cropByRow[row] || {};
        const sourceX = col * frameW + (crop.left || 0);
        const sourceY = row * frameH + (crop.top || 0);
        const sourceW = frameW - (crop.left || 0) - (crop.right || 0);
        const sourceH = frameH - (crop.top || 0) - (crop.bottom || 0);
        const scale = spriteConfig.spriteH / frameH;
        const spriteW = sourceW * scale;
        const spriteH = sourceH * scale;
        const spriteY = -spriteConfig.spriteH + 34 + (crop.top || 0) * scale;
        const flipX = spriteConfig.flips[player.direction];

        ctx.save();
        if (flipX) ctx.scale(-1, 1);
        ctx.drawImage(playerImage, sourceX, sourceY, sourceW, sourceH, -spriteW / 2, spriteY, spriteW, spriteH);
        ctx.restore();
      } else {
        ctx.fillStyle = "#f3a4c4";
        ctx.beginPath();
        ctx.arc(0, 0, player.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.font = "700 13px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(55, 22, 48, 0.72)";
      ctx.fillStyle = "#fff8ff";
      ctx.strokeText(player.name, 0, spriteConfig.nameY);
      ctx.fillText(player.name, 0, spriteConfig.nameY);
      ctx.restore();
    }

    function drawZombies() {
      for (const zombie of state.zombies) {
        const pct = clamp(zombie.hp / zombie.maxHp, 0, 1);
        ctx.save();
        ctx.translate(zombie.x, zombie.y);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.ellipse(0, 14, zombie.r * 1.05, zombie.r * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();

        if (monsterImage.complete && monsterImage.naturalWidth > 0) {
          const frameW = monsterImage.naturalWidth / 4;
          const frameH = monsterImage.naturalHeight / 4;
          const directionRows = { down: 0, up: 1, right: 2, left: 3 };
          const row = directionRows[zombie.direction] ?? 0;
          const col = Math.floor(zombie.animTime * 8) % 4;
          const spriteH = zombie.r * 3.1;
          const spriteW = spriteH * (frameW / frameH);
          ctx.globalAlpha = zombie.hit > 0 ? 0.68 : 1;
          ctx.drawImage(monsterImage, col * frameW, row * frameH, frameW, frameH, -spriteW / 2, -spriteH + 24, spriteW, spriteH);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle = zombie.hit > 0 ? "#d9ef9f" : "#d7a551";
          ctx.beginPath();
          ctx.arc(0, 0, zombie.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(zombie.x - 18, zombie.y - zombie.r - 22, 36, 4);
        ctx.fillStyle = "#f06b59";
        ctx.fillRect(zombie.x - 18, zombie.y - zombie.r - 22, 36 * pct, 4);
      }
    }

    function drawBullets() {
      for (const bullet of state.bullets) {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.rotate(Math.atan2(bullet.vy, bullet.vx));
        if (bullet.style === "pistol") {
          ctx.shadowColor = "#ffc95a";
          ctx.shadowBlur = 10;
          ctx.fillStyle = "rgba(255, 185, 70, 0.3)";
          ctx.fillRect(-18, -2, 18, 4);
          ctx.fillStyle = "#ffe08a";
          ctx.fillRect(-4, -3, 14, 6);
          ctx.fillStyle = "#fff8d6";
          ctx.fillRect(6, -2, 5, 4);
        } else {
          ctx.shadowColor = "#ff65bc";
          ctx.shadowBlur = 12;
          ctx.fillStyle = "#ff65bc";
          ctx.beginPath();
          ctx.arc(0, 0, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff2a6";
          ctx.fillRect(-2, -10, 4, 20);
          ctx.fillRect(-10, -2, 20, 4);
        }
        ctx.restore();
      }
    }

    function drawPickups() {
      for (const pickup of state.pickups) {
        ctx.save();
        ctx.translate(pickup.x, pickup.y);
        ctx.rotate(pickup.spin);
        ctx.fillStyle = pickup.type === "health" ? "#6fd08c" : "#e9c46a";
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = "#172018";
        if (pickup.type === "health") {
          ctx.fillRect(-3, -8, 6, 16);
          ctx.fillRect(-8, -3, 16, 6);
        } else {
          ctx.fillRect(-5, -7, 10, 14);
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawVignette(w, h) {
      const gradient = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.2, w / 2, h / 2, Math.max(w, h) * 0.72);
      gradient.addColorStop(0, "rgba(0,0,0,0)");
      gradient.addColorStop(1, "rgba(0,0,0,0.5)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(0.033, (now - state.last) / 1000);
      state.last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (event.code === "KeyR") reload();
      if (event.code === "Space") event.preventDefault();
      if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
        event.preventDefault();
        dash();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.code));
    window.addEventListener("pointermove", (event) => {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });
    window.addEventListener("pointerdown", (event) => {
      pointer.down = true;
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });
    window.addEventListener("pointerup", () => {
      pointer.down = false;
    });

    function releaseTouchButton(button) {
      const key = button.dataset.key;
      if (key) keys.delete(key);
      button.classList.remove("is-down");
    }

    for (const button of touchButtons) {
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        button.setPointerCapture(event.pointerId);
        const key = button.dataset.key;
        if (key) keys.add(key);
        if (button.dataset.tap === "dash") dash();
        button.classList.add("is-down");
      });

      button.addEventListener("pointerup", (event) => {
        event.preventDefault();
        event.stopPropagation();
        releaseTouchButton(button);
      });

      button.addEventListener("pointercancel", () => releaseTouchButton(button));
      button.addEventListener("lostpointercapture", () => releaseTouchButton(button));
    }

    function updateJoystick(event) {
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const max = rect.width * 0.34;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const dist = Math.hypot(dx, dy);
      const clamped = Math.min(dist, max);
      const nx = dist ? dx / dist : 0;
      const ny = dist ? dy / dist : 0;
      joystickState.x = (nx * clamped) / max;
      joystickState.y = (ny * clamped) / max;
      if (state.running) aimFromVector(joystickState.x, joystickState.y);
      stick.style.transform = `translate(calc(-50% + ${nx * clamped}px), calc(-50% + ${ny * clamped}px))`;
    }

    function resetJoystick() {
      joystickState.active = false;
      joystickState.x = 0;
      joystickState.y = 0;
      joystickState.pointerId = null;
      stick.style.transform = "translate(-50%, -50%)";
    }

    joystick.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      joystick.setPointerCapture(event.pointerId);
      joystickState.active = true;
      joystickState.pointerId = event.pointerId;
      updateJoystick(event);
    });

    window.addEventListener("pointermove", (event) => {
      if (!joystickState.active || joystickState.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      updateJoystick(event);
    });

    window.addEventListener("pointerup", (event) => {
      if (joystickState.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      resetJoystick();
    });

    joystick.addEventListener("pointercancel", resetJoystick);
    joystick.addEventListener("lostpointercapture", resetJoystick);

    startButton.addEventListener("click", () => {
      nicknameInput.value = cleanName(nicknameInput.value);
      localStorage.setItem("dead-block-run-name", nicknameInput.value);
      startScreen.classList.add("hidden");
      characterSelectScreen.classList.remove("hidden");
    });
    for (const card of characterCards) {
      card.addEventListener("click", () => {
        applyCharacter(card.dataset.character);
        resetGame();
      });
    }
    restartButton.addEventListener("click", resetGame);
    nicknameInput.value = localStorage.getItem("dead-block-run-name") || "";
    applyCharacter(selectedCharacter);
    renderLeaderboard();
    resize();
    draw();
  </script>
</body>
</html>
