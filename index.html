<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>루이에게서 살아남기</title>
  <meta name="description" content="귀여운 캐릭터로 루이 웨이브를 버티는 생존 슈팅 게임. 탄환 강화 아이템으로 2갈래, 3갈래, 4갈래까지 살아남기!">
  <meta property="og:type" content="website">
  <meta property="og:title" content="루이에게서 살아남기">
  <meta property="og:description" content="탄환 강화 아이템 추가! 2갈래, 3갈래, 4갈래로 살아남기.">
  <meta property="og:url" content="https://hyyyein.github.io/game_test/">
  <meta property="og:image" content="https://hyyyein.github.io/game_test/assets/og-image.png?v=20260430a">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="마법소녀와 권총소녀가 등을 맞대고 서 있는 루이에게서 살아남기 게임 이미지">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="루이에게서 살아남기">
  <meta name="twitter:description" content="탄환 강화 아이템 추가! 2갈래, 3갈래, 4갈래로 살아남기.">
  <meta name="twitter:image" content="https://hyyyein.github.io/game_test/assets/og-image.png?v=20260430a">
  <style>
    :root {
      color-scheme: dark;
      --bg: #171523;
      --panel: rgba(255, 239, 250, 0.18);
      --panel-strong: rgba(255, 246, 253, 0.28);
      --line: rgba(255, 255, 255, 0.42);
      --text: #fff8ff;
      --muted: #f5cce9;
      --accent: #ff9fd6;
      --accent-blue: #a8ddff;
      --danger: #ff7f9d;
      --good: #9ff3d2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
      background: #111712;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(760px, calc(100vw - 320px));
    }

    .pill,
    .banner,
    .help {
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 196, 230, 0.12) 42%, rgba(168, 221, 255, 0.16)),
        var(--panel);
      box-shadow:
        0 14px 34px rgba(67, 28, 72, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.55),
        inset 0 -1px 0 rgba(255, 156, 215, 0.2);
      backdrop-filter: blur(16px) saturate(1.25);
    }

    .pill {
      display: flex;
      min-width: 92px;
      height: 48px;
      padding: 8px 12px;
      border-radius: 8px;
      outline: 1px solid rgba(255, 182, 226, 0.18);
      flex-direction: column;
      justify-content: center;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 5px;
      font-size: 17px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .bar {
      position: relative;
      width: 104px;
      height: 8px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--good), var(--accent-blue), var(--accent));
      box-shadow: 0 0 12px rgba(255, 159, 214, 0.55);
    }

    .xp-bar {
      height: 5px;
      margin-top: 5px;
    }

    .xp-bar span {
      background: linear-gradient(90deg, #ff8fe6, #ffd77e, #a8ddff);
      box-shadow: 0 0 10px rgba(255, 215, 126, 0.48);
    }

    .help {
      max-width: 286px;
      padding: 12px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .banner {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(420px, calc(100vw - 32px));
      padding: 22px;
      transform: translate(-50%, -50%);
      border-radius: 8px;
      text-align: center;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.32), transparent 34%),
        linear-gradient(135deg, rgba(255, 238, 250, 0.34), rgba(167, 221, 255, 0.16) 55%, rgba(255, 157, 214, 0.16));
    }

    .game-over {
      width: min(840px, calc(100vw - 56px));
      max-height: min(680px, calc(100vh - 56px));
      padding: clamp(28px, 5vw, 48px) clamp(30px, 8vw, 72px) 42px;
      overflow: auto;
      background:
        radial-gradient(circle at 24% 16%, rgba(255, 245, 231, 0.32), transparent 38%),
        linear-gradient(135deg, rgba(255, 246, 229, 0.2), rgba(255, 189, 222, 0.1) 46%, rgba(168, 221, 255, 0.1)),
        rgba(79, 55, 46, 0.28);
      box-shadow:
        0 16px 34px rgba(46, 28, 24, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(255, 214, 178, 0.14);
      backdrop-filter: blur(8px) saturate(1.06);
    }

    .banner.game-over h1 {
      margin-bottom: 18px;
      font-size: clamp(48px, 7vw, 72px);
    }

    .banner.game-over p {
      margin-bottom: 30px;
      color: #ffd1ec;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
    }

    .banner h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 2px 16px rgba(255, 134, 207, 0.45);
    }

    .banner p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .start-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .notice-screen {
      width: min(760px, calc(100vw - 32px));
      max-height: min(820px, calc(100vh - 32px));
      padding: 16px;
      overflow: auto;
    }

    .notice-image {
      display: block;
      width: 100%;
      max-height: calc(100vh - 140px);
      object-fit: contain;
      border: 1px solid rgba(255, 226, 246, 0.46);
      border-radius: 8px;
      box-shadow: 0 14px 30px rgba(25, 11, 32, 0.34);
    }

    .notice-actions {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    button {
      min-width: 150px;
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffe2f3, var(--accent), var(--accent-blue));
      color: #40243a;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 10px 22px rgba(255, 124, 198, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    button:hover {
      filter: brightness(1.07) saturate(1.08);
    }

    .hidden {
      display: none;
    }

    .touch-controls {
      position: fixed;
      inset: auto 16px 18px 16px;
      display: none;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    .joystick {
      position: relative;
      width: 132px;
      height: 132px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.28), rgba(255, 173, 219, 0.16) 45%, rgba(168, 221, 255, 0.18)),
        var(--panel-strong);
      pointer-events: auto;
      touch-action: none;
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 159, 214, 0.32), rgba(168, 221, 255, 0.36));
      box-shadow:
        0 0 22px rgba(255, 159, 214, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .actions {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-btn {
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 173, 219, 0.2), rgba(168, 221, 255, 0.24)),
        var(--panel-strong);
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      touch-action: none;
      user-select: none;
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .touch-btn:active,
    .touch-btn.is-down {
      transform: translateY(1px);
      filter: brightness(1.13) saturate(1.12);
      box-shadow:
        0 0 22px rgba(255, 159, 214, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .touch-btn.fire {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      font-size: 25px;
    }

    .touch-btn.dash {
      width: 58px;
      height: 58px;
      align-self: flex-end;
      font-size: 19px;
    }

    .name-input {
      width: min(260px, 100%);
      height: 42px;
      margin: 0 0 14px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      text-align: center;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .name-input::placeholder {
      color: rgba(255, 248, 255, 0.7);
    }

    .leaderboard {
      display: grid;
      gap: 3px;
      width: min(560px, 100%);
      margin: 0 auto 32px;
      padding: 0;
      color: var(--text);
      list-style: none;
      text-align: center;
      font-size: clamp(20px, 2.5vw, 25px);
      font-weight: 800;
      line-height: 1.2;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 56px minmax(128px, 1fr) 18px 104px 18px 56px;
      align-items: baseline;
      column-gap: 0;
      min-height: 0;
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .rank-number {
      color: #ff8fe6;
      font-weight: 900;
      text-align: right;
      text-shadow: 0 2px 8px rgba(64, 26, 50, 0.36);
      white-space: nowrap;
    }

    .rank-name {
      min-width: 0;
      overflow: hidden;
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      text-align: left;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-separator {
      color: #fff8ff;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-score {
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: right;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-wave {
      color: #fff8ff;
      font-size: inherit;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: left;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
      white-space: nowrap;
    }

    .rank-empty {
      color: #fff8ff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.46);
    }

    .score-screen {
      width: min(640px, calc(100vw - 32px));
    }

    .score-screen h1 {
      margin-bottom: 22px;
    }

    .score-screen .leaderboard {
      margin-bottom: 24px;
    }

    .level-up-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 159, 214, 0.16), transparent 32%),
        rgba(12, 9, 18, 0.58);
      backdrop-filter: blur(5px) saturate(1.08);
    }

    .level-up-screen.hidden {
      display: none;
    }

    .level-up-panel {
      width: min(760px, calc(100vw - 24px));
      padding: 18px;
      border: 1px solid rgba(255, 226, 246, 0.52);
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(255, 225, 245, 0.2), rgba(137, 216, 255, 0.1)),
        rgba(31, 23, 39, 0.82);
      box-shadow:
        0 20px 46px rgba(16, 8, 24, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .level-up-panel h2 {
      margin: 0 0 14px;
      color: #fff8ff;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(255, 143, 230, 0.56);
    }

    .level-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .level-card {
      position: relative;
      display: grid;
      grid-template-rows: 58px auto 1fr;
      min-width: 0;
      min-height: 168px;
      padding: 12px 10px;
      overflow: hidden;
      border: 2px solid rgba(255, 248, 255, 0.68);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 20%, rgba(255, 255, 255, 0.12) 72%),
        radial-gradient(circle at 50% 35%, rgba(255, 248, 255, 0.12), transparent 40%),
        linear-gradient(180deg, rgba(28, 20, 42, 0.96), rgba(45, 31, 58, 0.94));
      color: var(--text);
      box-shadow:
        0 14px 28px rgba(10, 6, 18, 0.34),
        inset 0 0 0 1px rgba(255, 159, 214, 0.32),
        inset 0 0 18px rgba(168, 221, 255, 0.12);
    }

    .level-card::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(255, 213, 245, 0.28);
      border-radius: 5px;
      pointer-events: none;
    }

    .level-card:hover,
    .level-card:focus-visible {
      filter: brightness(1.08) saturate(1.1);
      outline: 2px solid rgba(255, 248, 255, 0.86);
      outline-offset: 3px;
    }

    .level-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      margin: 0 auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 30px;
      line-height: 1;
      text-shadow: 0 0 14px currentColor;
    }

    .level-card[data-tone="pink"] {
      border-color: rgba(255, 143, 230, 0.78);
    }

    .level-card[data-tone="gold"] {
      border-color: rgba(255, 215, 126, 0.82);
    }

    .level-card[data-tone="blue"] {
      border-color: rgba(168, 221, 255, 0.78);
    }

    .level-card h3 {
      margin: 8px 0 5px;
      color: #fff8ff;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
      text-shadow: 0 2px 8px rgba(32, 14, 34, 0.44);
      white-space: nowrap;
    }

    .level-card p {
      margin: 0;
      color: #f5cce9;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .character-select {
      width: min(560px, calc(100vw - 32px));
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      justify-content: center;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 16px;
    }

    .character-card {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      min-height: 190px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.34), transparent 40%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 173, 219, 0.12), rgba(168, 221, 255, 0.18)),
        var(--panel);
      color: var(--text);
      box-shadow:
        0 12px 26px rgba(67, 28, 72, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .character-card:focus-visible {
      outline: 2px solid rgba(255, 248, 255, 0.84);
      outline-offset: 3px;
    }

    .character-preview {
      width: 136px;
      height: 136px;
      margin: 0;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(35, 18, 42, 0.28));
    }

    .character-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
    }

    @media (max-width: 720px) {
      .hud {
        inset: 10px;
        align-items: stretch;
      }

      .cluster {
        display: grid;
        grid-template-columns: minmax(92px, 1.35fr) repeat(4, minmax(48px, 0.7fr));
        gap: 6px;
        max-width: 100%;
        width: 100%;
      }

      .pill {
        min-width: 0;
        height: 42px;
        padding: 7px 8px;
      }

      .label {
        font-size: 10px;
      }

      .value {
        margin-top: 4px;
        font-size: 14px;
      }

      .bar {
        width: 100%;
        height: 7px;
        margin-top: 6px;
      }

      .xp-bar {
        height: 4px;
        margin-top: 4px;
      }

      .help {
        display: none;
      }

      body.is-running .touch-controls {
        display: flex;
      }

      .character-select {
        width: min(420px, calc(100vw - 24px));
      }

      .character-grid {
        gap: 8px;
      }

      .character-card {
        min-height: 182px;
        padding: 9px;
      }

      .character-preview {
        width: 118px;
        height: 118px;
      }

      .notice-screen {
        width: min(390px, calc(100vw - 18px));
        padding: 10px;
      }

      .notice-image {
        max-height: calc(100vh - 104px);
      }

      .game-over {
        width: min(520px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        padding: 22px 24px 28px;
      }

      .banner.game-over h1 {
        margin-bottom: 12px;
        font-size: 40px;
      }

      .banner.game-over p {
        margin-bottom: 22px;
        font-size: 18px;
      }

      .leaderboard {
        gap: 3px;
        width: min(330px, 100%);
        margin-bottom: 22px;
        font-size: 17px;
      }

      .rank-row {
        grid-template-columns: 38px minmax(88px, 1fr) 12px 66px 12px 38px;
        width: min(330px, 100%);
      }

      .level-up-screen {
        padding: 10px;
      }

      .level-up-panel {
        width: min(390px, calc(100vw - 18px));
        padding: 12px;
      }

      .level-up-panel h2 {
        margin-bottom: 10px;
        font-size: 28px;
      }

      .level-card-grid {
        gap: 6px;
      }

      .level-card {
        grid-template-rows: 44px auto 1fr;
        min-height: 138px;
        padding: 8px 6px;
      }

      .level-icon {
        width: 44px;
        height: 44px;
        font-size: 24px;
      }

      .level-card h3 {
        margin: 7px 0 4px;
        font-size: 14px;
      }

      .level-card p {
        font-size: 10px;
        line-height: 1.22;
      }

    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Top-down zombie survival game"></canvas>

  <div class="hud">
    <div class="cluster">
      <div class="pill">
        <span class="label">Health</span>
        <div class="bar"><span id="healthBar"></span></div>
      </div>
      <div class="pill">
        <span class="label">Wave</span>
        <span class="value" id="wave">1</span>
      </div>
      <div class="pill">
        <span class="label">Level</span>
        <span class="value" id="level">1</span>
        <div class="bar xp-bar"><span id="xpBar"></span></div>
      </div>
      <div class="pill">
        <span class="label">Score</span>

    async function fetchOnlineLeaderboard() {
      const params = new URLSearchParams({
        select: "nickname,score,wave,created_at",
        order: "score.desc,wave.desc,created_at.asc",
        limit: "10",
      });
      const response = await fetch(`${scoresEndpoint}?${params}`, {
        headers: {
          apikey: supabaseKey,
          Authorization: `Bearer ${supabaseKey}`,
        },
      });
      if (!response.ok) throw new Error(`Leaderboard fetch failed: ${response.status}`);
      const entries = await response.json();
      return entries.map((entry) => ({
        name: entry.nickname,
        score: Number(entry.score) || 0,
        wave: Number(entry.wave) || 1,
        date: new Date(entry.created_at).getTime() || Date.now(),
      }));
    }

    async function uploadOnlineScore(entry) {
      const response = await fetch(scoresEndpoint, {
        method: "POST",
        headers: {
          apikey: supabaseKey,
          Authorization: `Bearer ${supabaseKey}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal",
        },
        body: JSON.stringify({
          nickname: entry.name,
          score: entry.score,
          wave: entry.wave,
        }),
      });
      if (!response.ok) throw new Error(`Score upload failed: ${response.status}`);
    }

    async function saveScore() {
      const entries = loadLeaderboard();
      const entry = {
        name: player.name,
        score: state.score,
        wave: state.wave,
        date: Date.now(),
      };
      entries.push(entry);
      entries.sort((a, b) => b.score - a.score || b.wave - a.wave || a.date - b.date);
      localStorage.setItem(leaderboardKey, JSON.stringify(entries.slice(0, 10)));
      try {
        await uploadOnlineScore(entry);
      } catch {
        // Local save already happened, so the score is not lost if the network fails.
      }
      renderLeaderboard();
    }

    function circleHitsRect(x, y, r, rect) {
      const nearestX = clamp(x, rect.x, rect.x + rect.w);
      const nearestY = clamp(y, rect.y, rect.y + rect.h);
      return Math.hypot(x - nearestX, y - nearestY) < r;
    }

    function hitsWall(x, y, r) {
      return walls.some((wall) => circleHitsRect(x, y, r, wall));
    }

    function moveActor(actor, dx, dy, radius) {
      const beforeX = actor.x;
      const beforeY = actor.y;
      const nextX = clamp(actor.x + dx, 28, world.w - 28);
      if (!hitsWall(nextX, actor.y, radius)) actor.x = nextX;
      const nextY = clamp(actor.y + dy, 28, world.h - 28);
      if (!hitsWall(actor.x, nextY, radius)) actor.y = nextY;
      return Math.hypot(actor.x - beforeX, actor.y - beforeY);
    }

    function findOpenPointAround(x, y, minRadius, maxRadius, bodyRadius) {
      for (let i = 0; i < 36; i++) {
        const angle = rand(0, Math.PI * 2);
        const radius = rand(minRadius, maxRadius);
        const px = clamp(x + Math.cos(angle) * radius, 44, world.w - 44);
        const py = clamp(y + Math.sin(angle) * radius, 44, world.h - 44);
        if (!hitsWall(px, py, bodyRadius)) return { x: px, y: py };
      }
      return null;
    }

        return candidates[Math.floor(rand(0, candidates.length))];

      return findOpenPointAround(player.x, player.y, 680, 920, clearRadius) || { x: world.w / 2, y: 220 };

      if (r < chargerChance) return "charger";
      if (r < chargerChance + tankChance) return "tank";
      if (r < chargerChance + tankChance + fastChance) return "fast";
      return "normal";

    function spawnZombie(forcedType) {

        r: radius,
        type,
        hp: Math.round(baseHp * spec.hp),
        maxHp: Math.round(baseHp * spec.hp),
        speed: baseSpeed * spec.speed,
        damage: spec.damage,
        scoreMult: spec.score,

    function shoot() {
      if (player.fireCooldown > 0 || player.reload > 0 || player.ammo <= 0) return;
      player.ammo -= 1;
      player.fireCooldown = player.fireDelay;
      player.castPulse = 0.2;
      const count = clamp(Math.round(player.projectileCount), 1, player.maxProjectileCount);
      const damageByCount = [0, 34, 28, 24, 21];
      const arc = player.spreadAngle * (count - 1);
      const start = -arc / 2;
      for (let i = 0; i < count; i++) {
        const offset = count === 1 ? 0 : start + player.spreadAngle * i;
        const angle = player.angle + offset + rand(-0.025, 0.025);
        const lane = count === 1 ? 0 : (i - (count - 1) / 2) * 5;
        const muzzleX = player.x + Math.cos(angle) * 42 - Math.sin(angle) * lane;
        const muzzleY = player.y + Math.sin(angle) * 42 + Math.cos(angle) * lane;
        const baseDamage = Math.round((damageByCount[count] || 21) * player.damageMultiplier);
        const crit = Math.random() < player.critChance;
        state.bullets.push({
          x: muzzleX,
          y: muzzleY,
          vx: Math.cos(angle) * 860,
          vy: Math.sin(angle) * 860,
          life: 0.78,
          damage: crit ? Math.round(baseDamage * player.critDamage) : baseDamage,
          pierce: player.pierce,
          crit,
          style: player.bulletStyle,
        });
      }
      const sparkColor = player.bulletStyle === "pistol" ? "#ffc95a" : "#ff65bc";
      puff(player.x + Math.cos(player.angle) * 46, player.y + Math.sin(player.angle) * 46, sparkColor, 6 + count, 220);
    }

    function reload() {
      if (player.reload <= 0 && player.ammo < player.maxAmmo) {
        player.reload = 0.95;
      }
    }

    function vectorActive(vector) {
      return Math.hypot(vector.x, vector.y) >= inputDeadZone;
    }

    function directionFromVector(x, y) {
      player.angle = Math.atan2(y, x);
      if (Math.abs(x) > Math.abs(y)) {
        player.direction = x > 0 ? "right" : "left";
      } else {
        player.direction = y > 0 ? "down" : "up";
      }
    }

    function aimFromVector(x, y) {
      if (Math.hypot(x, y) < inputDeadZone) return false;
      directionFromVector(x, y);
      return true;
    }

    function spritePoseFromAngle(spriteConfig) {
      if (!spriteConfig.angleRows) {
        return {
          row: spriteConfig.rows[player.direction] ?? 0,
          flipX: Boolean(spriteConfig.flips[player.direction]),
        };
      }
      const fullTurn = Math.PI * 2;
      const sector = fullTurn / spriteConfig.angleRows.length;
      const normalized = (player.angle + fullTurn) % fullTurn;
      const index = Math.floor(((normalized + sector / 2) % fullTurn) / sector);
      return {
        row: spriteConfig.angleRows[index] ?? 0,
        flipX: false,
      };
    }

    function getMoveVector() {
      const move = { x: 0, y: 0 };
      if (keys.has("KeyW") || keys.has("ArrowUp")) move.y -= 1;
      if (keys.has("KeyS") || keys.has("ArrowDown")) move.y += 1;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) move.x -= 1;
      if (keys.has("KeyD") || keys.has("ArrowRight")) move.x += 1;
      if (joystickState.active && vectorActive(joystickState)) {
        move.x += joystickState.x;
        move.y += joystickState.y;
      }
      return move;
    }

    function getPointerAimVector() {
      const rect = canvas.getBoundingClientRect();
      const targetX = camera.x + pointer.x - rect.left;
      const targetY = camera.y + pointer.y - rect.top;
      return {
        x: targetX - player.x,
        y: targetY - player.y,
      };
    }

    function dash() {
      if (player.dashCooldown > 0) return;
      player.dash = 0.16;
      player.dashCooldown = 1.15;
      player.invulnerable = 0.24;
    }

    function puff(x, y, color, count, speed) {
      for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const s = rand(speed * 0.25, speed);
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: rand(2, 5),
          life: rand(0.24, 0.58),
          maxLife: 0.58,
          color,
        });
      }
    }

    function update(dt) {
      if (state.pausedForLevelUp) {
        updateHud();
        return;
      }
      const wasReloading = player.reload > 0;
      player.fireCooldown = Math.max(0, player.fireCooldown - dt);
      player.reload = Math.max(0, player.reload - dt);
      player.dash = Math.max(0, player.dash - dt);
      player.dashCooldown = Math.max(0, player.dashCooldown - dt);
      player.invulnerable = Math.max(0, player.invulnerable - dt);
      player.castPulse = Math.max(0, player.castPulse - dt);
      state.bossAlertTimer = Math.max(0, state.bossAlertTimer - dt);
      if (wasReloading && player.reload === 0) player.ammo = player.maxAmmo;

      const move = getMoveVector();
      const moveLen = Math.hypot(move.x, move.y);
      const dashBoost = player.dash > 0 ? 2.7 : 1;
      const shooting = pointer.down || keys.has("Space");
      player.moving = moveLen > 0;
      if (player.moving) {
        player.animTime += dt * dashBoost;
      }
      if (joystickState.active && vectorActive(joystickState)) {
        aimFromVector(joystickState.x, joystickState.y);
      } else if (pointer.down) {
        const pointerAim = getPointerAimVector();
        aimFromVector(pointerAim.x, pointerAim.y);
      } else if (player.moving) {
        aimFromVector(move.x, move.y);
      }
      if (shooting) shoot();
      if (player.ammo === 0) reload();
      const len = moveLen || 1;
      moveActor(player, (move.x / len) * player.speed * dashBoost * dt, (move.y / len) * player.speed * dashBoost * dt, player.r);

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnZombie();
        state.spawnTimer = Math.max(0.9, 2.0 - state.wave * 0.08);
      }
      maybeSpawnBoss();

      for (const bullet of state.bullets) {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;
      }
      state.bullets = state.bullets.filter((b) => b.life > 0 && b.x > -80 && b.y > -80 && b.x < world.w + 80 && b.y < world.h + 80 && !hitsWall(b.x, b.y, 5));

      for (const zombie of state.zombies) {
        zombie.hit = Math.max(0, zombie.hit - dt);
        zombie.sway += dt * 3;
        const baseAngle = Math.atan2(player.y - zombie.y, player.x - zombie.x);
        const playerDistance = distance(zombie, player);
        zombie.chargeCooldown = Math.max(0, zombie.chargeCooldown - dt);
        if (zombie.chargeEnabled && zombie.chargeTimer <= 0 && zombie.chargeCooldown <= 0 && playerDistance > 130 && playerDistance < 560) {
          zombie.chargeTimer = 0.42;
          zombie.chargeCooldown = rand(2.35, 3.25);
          zombie.chargeVx = Math.cos(baseAngle);
          zombie.chargeVy = Math.sin(baseAngle);
          puff(zombie.x, zombie.y, zombie.aura || "#ff6f94", 8, 115);
        }
        zombie.chargeTimer = Math.max(0, zombie.chargeTimer - dt);
        const angle = zombie.chargeTimer > 0 ? Math.atan2(zombie.chargeVy, zombie.chargeVx) : baseAngle + Math.sin(zombie.sway) * 0.08;
        const vx = zombie.chargeTimer > 0 ? zombie.chargeVx : Math.cos(angle);
        const vy = zombie.chargeTimer > 0 ? zombie.chargeVy : Math.sin(angle);
        const speedMult = zombie.chargeTimer > 0 ? 2.75 : 1;
        const moved = moveActor(zombie, vx * zombie.speed * speedMult * dt, vy * zombie.speed * speedMult * dt, zombie.r * 0.85);
        if (moved < zombie.speed * speedMult * dt * 0.22) {
          zombie.stuck += dt;
          const side = Math.sin(zombie.sway * 1.7) > 0 ? 1 : -1;
          const slideX = -vy * side;
          const slideY = vx * side;
          moveActor(zombie, slideX * zombie.speed * dt * 0.95, slideY * zombie.speed * dt * 0.95, zombie.r * 0.85);
          if (zombie.stuck > 1.4 && distance(zombie, player) > 180) {
            const openPoint = findOpenPointAround(player.x, player.y, 360, 720, zombie.r * 0.85);
            if (openPoint) {
              zombie.x = openPoint.x;
              zombie.y = openPoint.y;
              zombie.stuck = 0;
            }
          }
        } else {
          zombie.stuck = 0;
        }
        zombie.animTime += dt * (zombie.chargeTimer > 0 ? 1.7 : 1);
        if (Math.abs(vx) > Math.abs(vy)) {
          zombie.direction = vx > 0 ? "right" : "left";
        } else {
          zombie.direction = vy > 0 ? "down" : "up";
        }

        if (distance(zombie, player) < zombie.r + player.r && player.invulnerable <= 0) {
          player.hp -= zombie.damage || 13;
          player.invulnerable = 0.55;
          zombie.x -= Math.cos(angle) * 36;
          zombie.y -= Math.sin(angle) * 36;
          puff(player.x, player.y, "#f06b59", 10, 150);
          if (player.hp <= 0) endGame();
        }
      }

      for (const bullet of state.bullets) {
        for (const zombie of state.zombies) {
          if (zombie.hp <= 0 || distance(bullet, zombie) > zombie.r + 4) continue;
          zombie.hp -= bullet.damage;
          zombie.hit = 0.1;
          if (bullet.pierce > 0) {
            bullet.pierce -= 1;
            bullet.life = Math.max(0, bullet.life - 0.08);
          } else {
            bullet.life = 0;
          }
          puff(bullet.x, bullet.y, bullet.crit ? "#ffd77e" : "#9acd6e", bullet.crit ? 11 : 6, bullet.crit ? 185 : 130);
          if (zombie.hp <= 0) killZombie(zombie);
          if (bullet.life <= 0) break;
        }
      }

      state.zombies = state.zombies.filter((z) => z.hp > 0);

      for (const pickup of state.pickups) {
        pickup.spin += dt * 4;
        const pickupDistance = distance(pickup, player);
        if (pickupDistance < player.magnetRadius && pickupDistance > player.pickupRadius) {
          const pull = Math.min(pickupDistance, (260 + player.magnetRadius * 1.2) * dt);
          pickup.x += ((player.x - pickup.x) / pickupDistance) * pull;
          pickup.y += ((player.y - pickup.y) / pickupDistance) * pull;
        }
        if (distance(pickup, player) < player.pickupRadius) {
          if (pickup.type === "xp") awardXp(pickup.amount || 1);
          if (pickup.type === "health") player.hp = Math.min(player.maxHp, player.hp + 24);
          if (pickup.type === "ammo") player.ammo = player.maxAmmo;
          if (pickup.type === "split") {
            player.projectileCount = Math.min(player.maxProjectileCount, player.projectileCount + 1);
          }
          pickup.life = 0;
          const pickupColor = pickup.type === "health" ? "#6fd08c" : pickup.type === "split" ? "#ff8fe6" : pickup.type === "xp" ? "#8fe6ff" : "#e9c46a";
          puff(pickup.x, pickup.y, pickupColor, pickup.type === "split" ? 22 : 12, pickup.type === "split" ? 190 : 125);
        }
        pickup.life -= dt;
      }
      state.pickups = state.pickups.filter((p) => p.life > 0);

      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life -= dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);

      updateCamera();
      updateHud();
    }

    function killZombie(zombie) {
      state.score += Math.round((100 + state.wave * 12) * (zombie.scoreMult || 1));
      state.waveKills += zombie.waveValue || 1;
      puff(zombie.x, zombie.y, zombie.aura || "#587747", zombie.isBoss ? 42 : 18, zombie.isBoss ? 260 : 180);
      state.pickups.push({
        x: zombie.x + rand(-10, 10),
        y: zombie.y + rand(-10, 10),
        type: "xp",
        amount: zombie.xpValue || 1,
        spin: 0,
        life: zombie.isBoss ? 26 : 22,
      });
      const canUpgradeShot = player.projectileCount < player.maxProjectileCount;
      const splitChance = zombie.isBoss ? 0.35 : 0.12;
      if (canUpgradeShot && Math.random() < splitChance) {
        state.pickups.push({
          x: zombie.x,
          y: zombie.y,
          type: "split",
          spin: 0,
          life: 10,
        });
      } else if (zombie.isBoss || Math.random() < 0.16) {
        state.pickups.push({
          x: zombie.x,
          y: zombie.y,
          type: zombie.isBoss || Math.random() < 0.45 ? "health" : "ammo",
          spin: 0,
          life: 9.5,
        });
      }
      if (state.waveKills >= state.nextWaveKills) {
        state.wave += 1;
        state.waveKills = 0;
        state.nextWaveKills += 5;
        player.maxAmmo = Math.min(42, player.maxAmmo + 2);
        player.ammo = player.maxAmmo;
        player.hp = Math.min(player.maxHp, player.hp + 18);
        spawnPack(2 + Math.ceil(state.wave / 2));
      }
    }

    function endGame() {
      state.running = false;
      state.pausedForLevelUp = false;
      state.bossAlertTimer = 0;
      bgm.pause();
      finalStats.textContent = `Score ${state.score} · Wave ${state.wave}`;
      saveScore();
      document.body.classList.remove("is-running");
      scoreScreen.classList.add("hidden");
      levelUpScreen.classList.add("hidden");
      gameOverScreen.classList.remove("hidden");
    }

    function getActiveBoss() {
      return state.zombies.find((zombie) => zombie.isBoss && zombie.hp > 0) || null;
    }

    function updateHud() {
      healthBar.style.width = `${clamp(player.hp / player.maxHp, 0, 1) * 100}%`;
      xpBar.style.width = `${clamp(state.xp / state.nextXp, 0, 1) * 100}%`;
      waveEl.textContent = state.wave;
      levelEl.textContent = state.level;
      scoreEl.textContent = state.score;
      ammoEl.textContent = player.reload > 0 ? "Reload" : `${player.ammo}/${player.maxAmmo}${player.projectileCount > 1 ? ` x${player.projectileCount}` : ""}`;
    }

    function draw() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(-camera.x, -camera.y);
      drawGround();
      drawProps();
      drawPickups();
      drawBullets();
      drawZombies();
      drawPlayer();
      drawParticles();
      ctx.restore();
      drawVignette(w, h);
      drawBossOverlay(w, h);
    }

    function drawGround() {
      ctx.fillStyle = "#121a14";
      ctx.fillRect(0, 0, world.w, world.h);
      if (mapImage.complete && mapImage.naturalWidth > 0) {
        ctx.drawImage(mapImage, 0, 0, world.w, world.h);
        ctx.fillStyle = "rgba(20, 12, 8, 0.14)";
        ctx.fillRect(0, 0, world.w, world.h);
      } else {
        ctx.strokeStyle = "rgba(232,239,221,0.045)";
        ctx.lineWidth = 1;
        for (let x = 0; x < world.w; x += 80) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, world.h);
          ctx.stroke();
        }
        for (let y = 0; y < world.h; y += 80) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(world.w, y);
          ctx.stroke();
        }
      }
      ctx.strokeStyle = "rgba(233,196,106,0.28)";
      ctx.lineWidth = 5;
      ctx.strokeRect(6, 6, world.w - 12, world.h - 12);
    }

    function drawProps() {
      for (const prop of state.props) {
        ctx.save();
        ctx.translate(prop.x, prop.y);
        ctx.rotate(prop.rot);
        ctx.fillStyle = prop.shade;
        ctx.fillRect(-prop.w / 2, -prop.h / 2, prop.w, prop.h);
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.lineWidth = 3;
        ctx.strokeRect(-prop.w / 2, -prop.h / 2, prop.w, prop.h);
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        ctx.fillRect(-prop.w / 2 + 8, -prop.h / 2 + 8, prop.w - 16, 5);
        ctx.restore();
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.globalAlpha = player.invulnerable > 0 ? 0.62 : 1;
      const spriteConfig = characters[player.character] || characters.pistol;
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.beginPath();
      ctx.ellipse(0, 22, 24, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      if (playerImage.complete && playerImage.naturalWidth > 0) {
        const frameCols = spriteConfig.frameCols || 4;
        const frameRows = spriteConfig.frameRows || 4;
        const frameW = playerImage.naturalWidth / frameCols;
        const frameH = playerImage.naturalHeight / frameRows;
        const walkFrame = Math.floor(player.animTime * 9) % frameCols;
        const pose = spritePoseFromAngle(spriteConfig);
        const row = pose.row;
        const castFrame = Math.min(frameCols - 1, 3);
        const col = player.castPulse > 0 && !player.moving ? castFrame : player.moving ? walkFrame : 0;
        const crop = spriteConfig.cropByRow[row] || {};
        const sourceX = col * frameW + (crop.left || 0);
        const sourceY = row * frameH + (crop.top || 0);
        const sourceW = frameW - (crop.left || 0) - (crop.right || 0);
        const sourceH = frameH - (crop.top || 0) - (crop.bottom || 0);
        const scale = spriteConfig.spriteH / frameH;
        const spriteW = sourceW * scale;
        const spriteH = sourceH * scale;
        const spriteY = -spriteConfig.spriteH + 34 + (crop.top || 0) * scale;
        const flipX = pose.flipX;

        ctx.save();
        if (flipX) ctx.scale(-1, 1);
        ctx.drawImage(playerImage, sourceX, sourceY, sourceW, sourceH, -spriteW / 2, spriteY, spriteW, spriteH);
        ctx.restore();
      } else {
        ctx.fillStyle = "#f3a4c4";
        ctx.beginPath();
        ctx.arc(0, 0, player.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.font = "700 13px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(55, 22, 48, 0.72)";
      ctx.fillStyle = "#fff8ff";
      ctx.strokeText(player.name, 0, spriteConfig.nameY);
      ctx.fillText(player.name, 0, spriteConfig.nameY);
      ctx.restore();
    }

    function drawZombies() {
      for (const zombie of state.zombies) {
        const pct = clamp(zombie.hp / zombie.maxHp, 0, 1);
        ctx.save();
        ctx.translate(zombie.x, zombie.y);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.ellipse(0, 14, zombie.r * 1.05, zombie.r * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        if (zombie.aura) {
          ctx.globalAlpha = zombie.chargeTimer > 0 ? 0.82 : 0.48;
          ctx.strokeStyle = zombie.aura;
          ctx.lineWidth = zombie.isBoss ? 4 : 2;
          ctx.beginPath();
          ctx.arc(0, 0, zombie.r + (zombie.isBoss ? 7 : 4), 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
        if (zombie.chargeTimer > 0) {
          ctx.strokeStyle = zombie.aura || "#ff6f94";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(-zombie.chargeVx * zombie.r * 0.3, -zombie.chargeVy * zombie.r * 0.3);
          ctx.lineTo(zombie.chargeVx * zombie.r * 1.6, zombie.chargeVy * zombie.r * 1.6);
          ctx.stroke();
        }

        const zombieImage = zombie.isBoss && bossMonsterImage.complete && bossMonsterImage.naturalWidth > 0 ? bossMonsterImage : monsterImage;
        if (zombieImage.complete && zombieImage.naturalWidth > 0) {
          const frameW = zombieImage.naturalWidth / 4;
          const frameH = zombieImage.naturalHeight / 4;
          const directionRows = { down: 0, up: 1, right: 2, left: 3 };
          const row = directionRows[zombie.direction] ?? 0;
          const col = Math.floor(zombie.animTime * 8) % 4;
          const spriteH = zombie.r * (zombie.isBoss ? 5.1 : 3.1);
          const spriteW = spriteH * (frameW / frameH);
          ctx.globalAlpha = zombie.hit > 0 ? 0.68 : 1;
          ctx.drawImage(zombieImage, col * frameW, row * frameH, frameW, frameH, -spriteW / 2, -spriteH + (zombie.isBoss ? 58 : 24), spriteW, spriteH);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle = zombie.hit > 0 ? "#d9ef9f" : zombie.aura || "#d7a551";
          ctx.beginPath();
          ctx.arc(0, 0, zombie.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
        const barW = clamp(zombie.r * 2.6, 36, 84);
        const barY = zombie.y - zombie.r - (zombie.isBoss ? 31 : 22);
        if (zombie.isBoss) {
          const nameY = zombie.y - zombie.r * 5.0;
          ctx.save();
          ctx.font = "900 16px ui-sans-serif, system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.lineWidth = 5;
          ctx.strokeStyle = "rgba(38, 12, 40, 0.88)";
          ctx.fillStyle = "#ffd7f2";
          ctx.strokeText("루이보스", zombie.x, nameY);
          ctx.fillText("루이보스", zombie.x, nameY);
          ctx.restore();
        }
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(zombie.x - barW / 2, barY, barW, 4);
        ctx.fillStyle = zombie.isBoss ? "#ff75da" : zombie.type === "tank" ? "#ffd071" : zombie.type === "fast" ? "#7adfff" : "#f06b59";
        ctx.fillRect(zombie.x - barW / 2, barY, barW * pct, 4);
      }
    }

    function drawBullets() {
      for (const bullet of state.bullets) {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.rotate(Math.atan2(bullet.vy, bullet.vx));
        if (bullet.crit) {
          ctx.shadowColor = "#ffd77e";
          ctx.shadowBlur = 18;
        }
        if (bullet.style === "pistol") {
          ctx.shadowColor = bullet.crit ? "#ffd77e" : "#ffc95a";
          ctx.shadowBlur = bullet.crit ? 18 : 10;
          ctx.fillStyle = "rgba(255, 185, 70, 0.3)";
          ctx.fillRect(-18 - bullet.pierce * 3, -2, 18 + bullet.pierce * 3, 4);
          ctx.fillStyle = bullet.crit ? "#fff2a6" : "#ffe08a";
          ctx.fillRect(-4, -3, 14 + bullet.pierce * 2, 6);
          ctx.fillStyle = "#fff8d6";
          ctx.fillRect(6, -2, 5, 4);
        } else {
          ctx.shadowColor = bullet.crit ? "#ffd77e" : "#ff65bc";
          ctx.shadowBlur = bullet.crit ? 18 : 12;
          ctx.fillStyle = bullet.crit ? "#ffd77e" : "#ff65bc";
          ctx.beginPath();
          ctx.arc(0, 0, 5 + bullet.pierce, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff2a6";
          ctx.fillRect(-2, -10, 4, 20);
          ctx.fillRect(-10, -2, 20, 4);
        }
        ctx.restore();
      }
    }

    function drawStar(cx, cy, points, outerRadius, innerRadius) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const radius = i % 2 === 0 ? outerRadius : innerRadius;
        const angle = -Math.PI / 2 + (i * Math.PI) / points;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function drawPickups() {
      for (const pickup of state.pickups) {
        ctx.save();
        ctx.translate(pickup.x, pickup.y);
        ctx.rotate(pickup.spin);
        if (pickup.type === "health") {
          ctx.fillStyle = "#6fd08c";
          ctx.fillRect(-10, -10, 20, 20);
          ctx.fillStyle = "#172018";
          ctx.fillRect(-3, -8, 6, 16);
          ctx.fillRect(-8, -3, 16, 6);
        } else if (pickup.type === "xp") {
          ctx.shadowColor = "#8fe6ff";
          ctx.shadowBlur = 12;
          ctx.fillStyle = "#8fe6ff";
          ctx.beginPath();
          ctx.moveTo(0, -13);
          ctx.lineTo(12, 0);
          ctx.lineTo(0, 13);
          ctx.lineTo(-12, 0);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "#fff8ff";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else if (pickup.type === "split") {
          ctx.shadowColor = "#ff8fe6";
          ctx.shadowBlur = 16;
          drawStar(0, 0, 5, 15, 7);
          ctx.fillStyle = "#ff8fe6";
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#fff8ff";
          ctx.stroke();
          ctx.shadowColor = "#a8ddff";
          ctx.shadowBlur = 8;
          ctx.fillStyle = "#a8ddff";
          ctx.beginPath();
          ctx.arc(0, 0, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.rotate(-pickup.spin);
          ctx.shadowBlur = 0;
          ctx.fillStyle = "#40243a";
          ctx.font = "900 12px ui-sans-serif, system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("+", 0, 0);
        } else {
          ctx.fillStyle = "#e9c46a";
          ctx.fillRect(-10, -10, 20, 20);
          ctx.fillStyle = "#172018";
          ctx.fillRect(-5, -7, 10, 14);
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawVignette(w, h) {
      const gradient = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.2, w / 2, h / 2, Math.max(w, h) * 0.72);
      gradient.addColorStop(0, "rgba(0,0,0,0)");
      gradient.addColorStop(1, "rgba(0,0,0,0.5)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
    }

    function drawBossOverlay(w, h) {
      const boss = getActiveBoss();
      if (boss) {
        const barW = Math.min(460, w - 36);
        const x = (w - barW) / 2;
        const y = w <= 720 ? 64 : 86;
        const pct = clamp(boss.hp / boss.maxHp, 0, 1);
        ctx.save();
        ctx.fillStyle = "rgba(24, 8, 28, 0.72)";
        ctx.strokeStyle = "rgba(255, 117, 218, 0.78)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, 16, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 117, 218, 0.92)";
        ctx.beginPath();
        ctx.roundRect(x + 3, y + 3, Math.max(0, (barW - 6) * pct), 10, 5);
        ctx.fill();
        ctx.font = "900 12px ui-sans-serif, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(38, 12, 40, 0.82)";
        ctx.fillStyle = "#fff8ff";
        ctx.strokeText("BOSS LOUI", w / 2, y - 5);
        ctx.fillText("BOSS LOUI", w / 2, y - 5);
        ctx.restore();
      }

      if (state.bossAlertTimer > 0) {
        const t = clamp(state.bossAlertTimer / 2.2, 0, 1);
        ctx.save();
        ctx.globalAlpha = Math.min(1, t * 1.4);
        ctx.fillStyle = `rgba(255, 80, 180, ${0.12 + 0.18 * Math.sin(t * Math.PI)})`;
        ctx.fillRect(0, 0, w, h);
        ctx.font = `900 ${w <= 720 ? 34 : 46}px ui-sans-serif, system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.lineWidth = 8;
        ctx.strokeStyle = "rgba(36, 8, 42, 0.82)";
        ctx.fillStyle = "#ffd7f2";
        ctx.strokeText("BOSS WAVE", w / 2, h * 0.22);
        ctx.fillText("BOSS WAVE", w / 2, h * 0.22);
        ctx.restore();
      }
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(0.033, (now - state.last) / 1000);
      state.last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (event.code === "KeyR") reload();
      if (event.code === "Space") event.preventDefault();
      if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
        event.preventDefault();
        dash();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.code));
    window.addEventListener("pointermove", (event) => {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });
    window.addEventListener("pointerdown", (event) => {
      pointer.down = true;
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });
    window.addEventListener("pointerup", () => {
      pointer.down = false;
    });

    function releaseTouchButton(button) {
      const key = button.dataset.key;
      if (key) keys.delete(key);
      button.classList.remove("is-down");
    }

    for (const button of touchButtons) {
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        button.setPointerCapture(event.pointerId);
        const key = button.dataset.key;
        if (key) keys.add(key);
        if (button.dataset.tap === "dash") dash();
        button.classList.add("is-down");
      });

      button.addEventListener("pointerup", (event) => {
        event.preventDefault();
        event.stopPropagation();
        releaseTouchButton(button);
      });

      button.addEventListener("pointercancel", () => releaseTouchButton(button));
      button.addEventListener("lostpointercapture", () => releaseTouchButton(button));
    }

    function updateJoystick(event) {
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const max = rect.width * 0.34;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const dist = Math.hypot(dx, dy);
      const clamped = Math.min(dist, max);
      const nx = dist ? dx / dist : 0;
      const ny = dist ? dy / dist : 0;
      joystickState.x = (nx * clamped) / max;
      joystickState.y = (ny * clamped) / max;
      if (state.running && vectorActive(joystickState)) aimFromVector(joystickState.x, joystickState.y);
      stick.style.transform = `translate(calc(-50% + ${nx * clamped}px), calc(-50% + ${ny * clamped}px))`;
    }

    function resetJoystick() {
      joystickState.active = false;
      joystickState.x = 0;
      joystickState.y = 0;
      joystickState.pointerId = null;
      stick.style.transform = "translate(-50%, -50%)";
    }

    joystick.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      joystick.setPointerCapture(event.pointerId);
      joystickState.active = true;
      joystickState.pointerId = event.pointerId;
      updateJoystick(event);
    });

    window.addEventListener("pointermove", (event) => {
      if (!joystickState.active || joystickState.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      updateJoystick(event);
    });

    window.addEventListener("pointerup", (event) => {
      if (joystickState.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      resetJoystick();
    });

    joystick.addEventListener("pointercancel", resetJoystick);
    joystick.addEventListener("lostpointercapture", resetJoystick);

    startButton.addEventListener("click", () => {
      nicknameInput.value = cleanName(nicknameInput.value);
      localStorage.setItem("dead-block-run-name", nicknameInput.value);
      startScreen.classList.add("hidden");
      scoreScreen.classList.add("hidden");
      noticeScreen.classList.add("hidden");
      characterSelectScreen.classList.remove("hidden");
    });
    scoreboardButton.addEventListener("click", () => {
      renderLeaderboard();
      startScreen.classList.add("hidden");
      noticeScreen.classList.add("hidden");
      scoreScreen.classList.remove("hidden");
    });
    noticeButton.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      scoreScreen.classList.add("hidden");
      noticeScreen.classList.remove("hidden");
    });
    closeScoreButton.addEventListener("click", () => {
      scoreScreen.classList.add("hidden");
      if (!state.running) startScreen.classList.remove("hidden");
    });
    closeNoticeButton.addEventListener("click", () => {
      noticeScreen.classList.add("hidden");
      if (!state.running) startScreen.classList.remove("hidden");
    });
    for (const card of characterCards) {
      card.addEventListener("click", () => {
        applyCharacter(card.dataset.character);
        resetGame();
      });
    }
    restartButton.addEventListener("click", resetGame);
    levelCardGrid.addEventListener("click", (event) => {
      const card = event.target.closest(".level-card");
      if (!card) return;
      chooseLevelUpgrade(card.dataset.upgrade);
    });
    nicknameInput.value = localStorage.getItem("dead-block-run-name") || "";
    applyCharacter(selectedCharacter);
    renderLeaderboard();
    resize();
    draw();
  </script>
</body>
</html>
